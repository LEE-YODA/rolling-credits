<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Monthly Stats</title>

  <style>
    body {
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .widget {
      width: 320px;
      padding: 25px;
      border-radius: 25px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    .section-title {
      font-weight: bold;
      margin-top: 15px;
    }

    .divider {
      border-top: 1px solid rgba(255,255,255,0.2);
      margin: 15px 0;
    }

    .highlight {
      font-size: 16px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div class="widget">
    <h2 id="month">LOADING</h2>

    <div class="section-title">BEST MOVIE</div>
    <div id="best-movie">-</div>

    <div class="section-title">BEST DRAMA</div>
    <div id="best-drama">-</div>

    <div class="divider"></div>

    <div id="movie-summary"></div>
    <div id="movie-avg" class="highlight"></div>

    <div class="divider"></div>

    <div id="drama-summary"></div>
    <div id="drama-avg" class="highlight"></div>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch("https://rolling-credits.vercel.app/api/stats");
        const data = await res.json();

        document.getElementById("month").innerText = data.month;

        document.getElementById("best-movie").innerText =
          data.bestMovie.title
            ? `${data.bestMovie.title} (${data.bestMovie.rating})`
            : "-";

        document.getElementById("best-drama").innerText =
          data.bestDrama.title
            ? `${data.bestDrama.title} (${data.bestDrama.rating})`
            : "-";

        document.getElementById("movie-summary").innerText =
          `이번 달에는 영화를 ${data.movieCount}편 봤어요`;

        document.getElementById("movie-avg").innerText =
          `★ ${data.movieAvg}`;

        document.getElementById("drama-summary").innerText =
          `이번 달에는 드라마를 ${data.dramaCount}편 봤어요`;

        document.getElementById("drama-avg").innerText =
          `★ ${data.dramaAvg}`;

      } catch (err) {
        console.error(err);
        document.querySelector(".widget").innerHTML = "데이터 로딩 실패 😢";
      }
    }

    loadData();
  </script>

</body>
</html>
