<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROLLING CREDITS — Stats</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;color:#e8e4dc;font-family:monospace;padding:16px;}
.top{display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:.5px dashed #2a2a2a;}
.top span{font-size:9px;color:#555;letter-spacing:2px;}
.month-title{font-size:13px;color:#c8a882;letter-spacing:3px;margin-bottom:14px;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.stat-box{background:#0d0d0d;border:.5px solid #222;border-radius:6px;padding:10px;}
.stat-label{font-size:8px;color:#555;margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:700;}
.stat-unit{font-size:10px;color:#888;margin-left:3px;}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.b-box{background:#0d0d0d;border:.5px solid #222;border-radius:6px;padding:10px;}
.b-label{font-size:8px;color:#555;margin-bottom:6px;}
.b-val{font-size:13px;color:#c8a882;}
.loading{text-align:center;padding:40px 0;font-size:10px;color:#555;}
.error{font-size:10px;color:#ff6b6b;text-align:center;padding:20px;}
button{width:100%;margin-top:10px;padding:8px;background:#1a1a1a;border:1px solid #c8a882;color:#c8a882;cursor:pointer;}
input{width:100%;padding:8px;background:#0d0d0d;border:1px solid #333;color:#fff;margin-bottom:6px;}
</style>
</head>

<body>

<div class="top">
  <span>&gt;_ STATS.MONTHLY</span>
  <span>ROLLING CREDITS</span>
</div>

<div id="token-area"></div>
<div id="content"></div>

<script>
const DB_ID = "342cba469aad80e38950c7991cf1c491"; // ✅ 수정 완료
let NOTION_TOKEN = localStorage.getItem("rc_token") || "";

function showLoading(){
  document.getElementById("content").innerHTML = '<div class="loading">LOADING...</div>';
}

function renderTokenForm(){
  document.getElementById("token-area").innerHTML = `
    <input type="password" id="tokenInput" placeholder="secret_로 시작하는 토큰">
    <button onclick="saveToken()">저장 후 불러오기</button>
  `;
}

function saveToken(){
  const val = document.getElementById("tokenInput").value.trim();
  if(!val) return;
  localStorage.setItem("rc_token", val);
  NOTION_TOKEN = val;
  document.getElementById("token-area").innerHTML="";
  loadStats();
}

function resetToken(){
  localStorage.removeItem("rc_token");
  NOTION_TOKEN="";
  renderTokenForm();
}

function renderError(msg){
  document.getElementById("content").innerHTML = `
    <div class="error">${msg}</div>
    <button onclick="resetToken()">토큰 다시 입력</button>
  `;
}

function getMonthRange(){
  const now=new Date();
  return {
    start:new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10),
    end:new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().slice(0,10)
  };
}

async function loadStats(){
  if(!NOTION_TOKEN){
    renderTokenForm();
    return;
  }

  showLoading();

  try{
    const res = await fetch(`https://corsproxy.io/?https://api.notion.com/v1/databases/${DB_ID}/query`,{
      method:"POST",
      headers:{
        "Authorization":`Bearer ${NOTION_TOKEN}`,
        "Notion-Version":"2022-06-28",
        "Content-Type":"application/json"
      },
      body:JSON.stringify({})
    });

    if(!res.ok){
      throw new Error("API 오류: "+res.status);
    }

    const data = await res.json();
    const pages = data.results;

    let watched=0, watching=0;

    pages.forEach(p=>{
      const status=p.properties["상태"]?.status?.name;
      if(status==="WATCHED") watched++;
      if(status==="WATCHING") watching++;
    });

    document.getElementById("content").innerHTML = `
      <div class="month-title">이번 달</div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">WATCHED</div>
          <div class="stat-val">${watched}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">WATCHING</div>
          <div class="stat-val">${watching}</div>
        </div>
      </div>
      <button onclick="loadStats()">새로고침</button>
    `;

  }catch(e){
    renderError(e.message);
  }
}

if(NOTION_TOKEN){
  loadStats();
}else{
  renderTokenForm();
}
</script>

</body>
</html>
