<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROLLING CREDITS — Stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #111; height: 100%; }
  body { font-family: monospace; color: #e8e4dc; padding: 16px; }
  .w { background: #111; }
  .top { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 0.5px dashed #2a2a2a; }
  .top span { font-size: 9px; color: #555; letter-spacing: 2px; }
  .month-title { font-size: 13px; color: #c8a882; letter-spacing: 3px; margin-bottom: 14px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stat-box { background: #0d0d0d; border: 0.5px solid #222; border-radius: 6px; padding: 10px; }
  .stat-label { font-size: 8px; color: #555; letter-spacing: 2px; margin-bottom: 6px; }
  .stat-val { font-size: 26px; font-weight: 700; color: #e8e4dc; line-height: 1; }
  .stat-unit { font-size: 10px; color: #888; margin-left: 3px; }
  .stat-sub { font-size: 8px; color: #c8a882; margin-top: 4px; letter-spacing: 1px; }
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .b-box { background: #0d0d0d; border: 0.5px solid #222; border-radius: 6px; padding: 10px; }
  .b-label { font-size: 8px; color: #555; letter-spacing: 2px; margin-bottom: 6px; }
  .b-val { font-size: 13px; color: #c8a882; letter-spacing: 1px; word-break: break-all; }
  .loading { text-align: center; padding: 40px 0; font-size: 10px; color: #555; letter-spacing: 2px; }
  .dot { display: inline-block; animation: blink 1s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,100%{opacity:0} 50%{opacity:1} }
  .error { font-size: 10px; color: #8b1a1a; text-align: center; padding: 20px; letter-spacing: 1px; line-height: 1.8; }
  .token-form { margin-bottom: 14px; }
  .token-form input { width: 100%; background: #0d0d0d; border: 0.5px solid #333; border-radius: 4px; padding: 8px; color: #e8e4dc; font-family: monospace; font-size: 10px; margin-bottom: 6px; }
  .token-form button { width: 100%; background: #1a1a1a; border: 0.5px solid #c8a882; border-radius: 4px; padding: 6px; color: #c8a882; font-family: monospace; font-size: 10px; cursor: pointer; letter-spacing: 1px; }
  .token-form button:hover { background: #222; }
  .refresh-btn { width: 100%; margin-top: 10px; background: transparent; border: 0.5px dashed #2a2a2a; border-radius: 4px; padding: 6px; color: #555; font-family: monospace; font-size: 9px; cursor: pointer; letter-spacing: 1px; }
  .refresh-btn:hover { border-color: #555; color: #888; }
</style>
</head>
<body>
<div class="w">
  <div class="top">
    <span>&gt;_ STATS.MONTHLY</span>
    <span>ROLLING CREDITS</span>
  </div>
  <div id="token-area"></div>
  <div id="content">
    <div class="loading">LOADING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  </div>
</div>

<script>
const DB_ID = '342cba469aad80e38950c7991cf1c491';
let NOTION_TOKEN = localStorage.getItem('rc_notion_token') || '';

function getMonthRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const end = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
  return { start, end };
}

function getMonthLabel() {
  const now = new Date();
  return `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}`;
}

function renderTokenForm() {
  document.getElementById('token-area').innerHTML = `
    <div class="token-form">
      <div style="font-size:9px;color:#555;letter-spacing:1px;margin-bottom:6px">노션 토큰 입력</div>
      <input type="password" id="tokenInput" placeholder="ntn_으로 시작하는 토큰">
      <button onclick="saveToken()">저장 후 불러오기</button>
    </div>`;
}

function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  NOTION_TOKEN = val;
  localStorage.setItem('rc_notion_token', val);
  document.getElementById('token-area').innerHTML = '';
  loadStats();
}

function renderStats(watched, watching, avgRating, topGenre) {
  const ratingStr = avgRating > 0 ? ('★'.repeat(Math.min(5, Math.round(avgRating))) + ' ' + avgRating.toFixed(1)) : '-';
  document.getElementById('content').innerHTML = `
    <div class="month-title">${getMonthLabel()}</div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">WATCHED</div>
        <div class="stat-val">${watched}<span class="stat-unit">편</span></div>
        <div class="stat-sub">완료</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">WATCHING</div>
        <div class="stat-val">${watching}<span class="stat-unit">편</span></div>
        <div class="stat-sub">진행 중</div>
      </div>
    </div>
    <div class="bottom-row">
      <div class="b-box">
        <div class="b-label">AVG RATING</div>
        <div class="b-val">${ratingStr}</div>
      </div>
      <div class="b-box">
        <div class="b-label">TOP GENRE</div>
        <div class="b-val">${topGenre || '-'}</div>
      </div>
    </div>
    <button class="refresh-btn" onclick="loadStats()">↺ 새로고침</button>`;
}

function renderError(msg, showTokenInput = false) {
  document.getElementById('content').innerHTML = `
    <div class="error">${msg}</div>
    <button class="refresh-btn" onclick="resetToken()">토큰 다시 입력</button>
  `;
}

 function resetToken() {
  localStorage.removeItem('rc_notion_token');
  NOTION_TOKEN = '';
  renderTokenForm();
  document.getElementById('content').innerHTML = '';
}

if (!res.ok) { 
  renderError(
    'API 오류: ' + res.status + '<br>토큰 또는 DB 설정을 확인해주세요', 
    true
  ); 
  return; 
}
 
async function loadStats() {
  if (!NOTION_TOKEN) { renderTokenForm(); document.getElementById('content').innerHTML = ''; return; }

  document.getElementById('content').innerHTML = '<div class="loading">LOADING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>';

  const { start, end } = getMonthRange();

  try {
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://api.notion.com/v1/databases/' + DB_ID + '/query')}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${NOTION_TOKEN}`,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28'
      },
      body: JSON.stringify({ page_size: 100 })
    });

    if (!res.ok) { renderError('API 오류: ' + res.status + '\n토큰을 확인해주세요'); return; }

    const data = await res.json();
    const pages = data.results || [];

    let watched = 0, watching = 0;
    let totalRating = 0, ratingCount = 0;
    const genreCount = {};

    pages.forEach(p => {
      const props = p.properties;
      const status = props['상태']?.status?.name || '';
      const rating = props['평점']?.number || 0;
      const genres = props['장르']?.multi_select || [];
      const 시청일 = props['시청일']?.date?.start || '';

      if (status === 'WATCHED' && 시청일 >= start && 시청일 <= end) {
        watched++;
        if (rating > 0) { totalRating += rating; ratingCount++; }
        genres.forEach(g => { genreCount[g.name] = (genreCount[g.name] || 0) + 1; });
      }
      if (status === 'WATCHING') {
        watching++;
        genres.forEach(g => { genreCount[g.name] = (genreCount[g.name] || 0) + 1; });
      }
    });

    const avgRating = ratingCount > 0 ? totalRating / ratingCount : 0;
    const topGenre = Object.entries(genreCount).sort((a,b) => b[1]-a[1])[0]?.[0] || '-';

    renderStats(watched, watching, avgRating, topGenre);
  } catch(e) {
    renderError('연결 실패\n잠시 후 새로고침 해주세요');
  }
}

if (NOTION_TOKEN) {
  loadStats();
} else {
  renderTokenForm();
  document.getElementById('content').innerHTML = '';
}
</script>
</body>
</html>
